<div class="pg-wrapper">
  <div class="pg-container">
    <div class="pg-result-container">
      <span id="pg-result">Click Generate</span>
      <button class="pg-btn pg-btn-copy" id="pg-copy-btn" title="Copy to clipboard">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
      </button>
    </div>
    
    <div class="pg-settings">
      <div class="pg-setting">
        <label>Password Length <span id="pg-length-val">16</span></label>
        <input type="range" id="pg-length" min="4" max="64" value="16" class="pg-slider">
      </div>
      
      <label class="pg-checkbox-container">
        <input type="checkbox" id="pg-uppercase" checked>
        <span class="pg-checkmark"></span>
        Include Uppercase Letters (A-Z)
      </label>
      
      <label class="pg-checkbox-container">
        <input type="checkbox" id="pg-lowercase" checked>
        <span class="pg-checkmark"></span>
        Include Lowercase Letters (a-z)
      </label>
      
      <label class="pg-checkbox-container">
        <input type="checkbox" id="pg-numbers" checked>
        <span class="pg-checkmark"></span>
        Include Numbers (0-9)
      </label>
      
      <label class="pg-checkbox-container">
        <input type="checkbox" id="pg-symbols" checked>
        <span class="pg-checkmark"></span>
        Include Symbols (!@#$...)
      </label>
    </div>
    
    <button class="pg-btn pg-btn-generate" id="pg-generate-btn">Generate Password</button>
  </div>
</div>

<style>
.pg-wrapper {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 3rem 1rem;
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
}

.pg-container {
  background: linear-gradient(145deg, #1e293b, #0f172a);
  border: 1px solid #334155;
  border-radius: 16px;
  padding: 2rem;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
  color: #f8fafc;
}

.pg-result-container {
  background: rgba(15, 23, 42, 0.8);
  border: 1px solid #334155;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 1.2rem;
  margin-bottom: 2rem;
  box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.2);
}

#pg-result {
  font-family: 'Fira Code', 'Courier New', Courier, monospace;
  font-size: 1.35rem;
  word-break: break-all;
  color: #10b981;
  letter-spacing: 1.5px;
  font-weight: 500;
}

.pg-btn {
  border: none;
  cursor: pointer;
  transition: all 0.2s ease;
}

.pg-btn-copy {
  background: #1e293b;
  color: #94a3b8;
  padding: 0.6rem;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid #334155;
}

.pg-btn-copy:hover {
  background: #334155;
  color: #f8fafc;
  transform: translateY(-2px);
}

.pg-btn-copy:active {
  transform: translateY(0);
}

.pg-btn-copy svg {
  width: 22px;
  height: 22px;
}

.pg-settings {
  display: flex;
  flex-direction: column;
  gap: 1.25rem;
  margin-bottom: 2rem;
}

.pg-setting {
  display: flex;
  flex-direction: column;
  gap: 0.8rem;
  margin-bottom: 0.5rem;
}

.pg-setting label {
  display: flex;
  justify-content: space-between;
  font-size: 0.95rem;
  font-weight: 500;
  color: #cbd5e1;
}

#pg-length-val {
  color: #10b981;
  font-weight: 600;
  font-size: 1.1rem;
}

.pg-slider {
  -webkit-appearance: none;
  width: 100%;
  height: 8px;
  border-radius: 4px;
  background: #334155;
  outline: none;
}

.pg-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: #10b981;
  cursor: pointer;
  box-shadow: 0 0 12px rgba(16, 185, 129, 0.4);
  transition: transform 0.1s;
}

.pg-slider::-webkit-slider-thumb:hover {
  transform: scale(1.15);
  box-shadow: 0 0 16px rgba(16, 185, 129, 0.6);
}

.pg-slider::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: #10b981;
  cursor: pointer;
  box-shadow: 0 0 12px rgba(16, 185, 129, 0.4);
  border: none;
}

.pg-checkbox-container {
  display: flex;
  align-items: center;
  position: relative;
  padding-left: 36px;
  cursor: pointer;
  font-size: 0.95rem;
  user-select: none;
  color: #94a3b8;
  transition: color 0.2s;
}

.pg-checkbox-container:hover {
  color: #f8fafc;
}

.pg-checkbox-container input {
  position: absolute;
  opacity: 0;
  cursor: pointer;
  height: 0;
  width: 0;
}

.pg-checkmark {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  left: 0;
  height: 22px;
  width: 22px;
  background-color: #1e293b;
  border: 1px solid #334155;
  border-radius: 6px;
  transition: all 0.2s;
}

.pg-checkbox-container:hover input ~ .pg-checkmark {
  background-color: #334155;
}

.pg-checkbox-container input:checked ~ .pg-checkmark {
  background-color: #10b981;
  border-color: #10b981;
  box-shadow: 0 0 10px rgba(16, 185, 129, 0.3);
}

.pg-checkmark:after {
  content: "";
  position: absolute;
  display: none;
}

.pg-checkbox-container input:checked ~ .pg-checkmark:after {
  display: block;
}

.pg-checkbox-container .pg-checkmark:after {
  left: 7px;
  top: 3px;
  width: 6px;
  height: 12px;
  border: solid white;
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
}

.pg-btn-generate {
  width: 100%;
  padding: 1.1rem;
  background: linear-gradient(135deg, #10b981, #059669);
  color: white;
  font-size: 1.05rem;
  font-weight: 600;
  border-radius: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  box-shadow: 0 4px 12px -2px rgba(16, 185, 129, 0.5);
}

.pg-btn-generate:hover {
  background: linear-gradient(135deg, #059669, #047857);
  box-shadow: 0 6px 16px -2px rgba(16, 185, 129, 0.6);
  transform: translateY(-2px);
}

.pg-btn-generate:active {
  transform: translateY(1px);
  box-shadow: 0 2px 8px -2px rgba(16, 185, 129, 0.5);
}
</style>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const resultEl = document.getElementById('pg-result');
  const lengthEl = document.getElementById('pg-length');
  const lengthValEl = document.getElementById('pg-length-val');
  const uppercaseEl = document.getElementById('pg-uppercase');
  const lowercaseEl = document.getElementById('pg-lowercase');
  const numbersEl = document.getElementById('pg-numbers');
  const symbolsEl = document.getElementById('pg-symbols');
  const generateBtn = document.getElementById('pg-generate-btn');
  const copyBtn = document.getElementById('pg-copy-btn');

  const randomFunc = {
    lower: getRandomLower,
    upper: getRandomUpper,
    number: getRandomNumber,
    symbol: getRandomSymbol
  };

  lengthEl.addEventListener('input', (e) => {
    lengthValEl.innerText = e.target.value;
  });

  generateBtn.addEventListener('click', () => {
    const length = +lengthEl.value;
    const hasLower = lowercaseEl.checked;
    const hasUpper = uppercaseEl.checked;
    const hasNumber = numbersEl.checked;
    const hasSymbol = symbolsEl.checked;

    resultEl.innerText = generatePassword(hasLower, hasUpper, hasNumber, hasSymbol, length);
    resultEl.style.color = '#10b981';
  });

  copyBtn.addEventListener('click', () => {
    const password = resultEl.innerText;
    if (!password || password === 'Click Generate') return;

    // Use modern clipboard API if available
    if (navigator.clipboard) {
      navigator.clipboard.writeText(password).then(showCopiedFeedback);
    } else {
      // Fallback
      const textarea = document.createElement('textarea');
      textarea.value = password;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      textarea.remove();
      showCopiedFeedback();
    }
  });

  function showCopiedFeedback() {
    copyBtn.innerHTML = '<svg fill="none" stroke="#10b981" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>';
    setTimeout(() => {
      copyBtn.innerHTML = '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>';
    }, 2000);
  }

  function generatePassword(lower, upper, number, symbol, length) {
    let generatedPassword = '';
    const typesCount = lower + upper + number + symbol;
    const typesArr = [{lower}, {upper}, {number}, {symbol}].filter(item => Object.values(item)[0]);

    if(typesCount === 0) {
      return '';
    }

    // Ensure at least one of each selected type is present
    typesArr.forEach(type => {
      const funcName = Object.keys(type)[0];
      generatedPassword += randomFunc[funcName]();
    });

    for(let i = typesCount; i < length; i++) {
      const funcName = Object.keys(typesArr[Math.floor(Math.random() * typesArr.length)])[0];
      generatedPassword += randomFunc[funcName]();
    }

    // Shuffle the generated password
    const shuffledPassword = generatedPassword.split('').sort(() => 0.5 - Math.random()).join('');
    
    return shuffledPassword;
  }

  function getRandomLower() {
    return String.fromCharCode(Math.floor(Math.random() * 26) + 97);
  }

  function getRandomUpper() {
    return String.fromCharCode(Math.floor(Math.random() * 26) + 65);
  }

  function getRandomNumber() {
    return String.fromCharCode(Math.floor(Math.random() * 10) + 48);
  }

  function getRandomSymbol() {
    const symbols = '!@#$%^&*(){}[]=<>/,.';
    return symbols[Math.floor(Math.random() * symbols.length)];
  }
  
  // Initial generate
  generateBtn.click();
});
</script>
