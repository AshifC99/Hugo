<div class="pg-wrap">

  <div class="pg-container">
    <h2 class="pg-title">Password Generator</h2>

    <div class="pg-options">
      <div class="pg-option">
        <label for="pg-length">Lunghezza</label>
        <input type="number" id="pg-length" value="12" min="6" max="64">
      </div>
      <div class="pg-option">
        <label for="pg-uppercase">Maiuscole (A-Z)</label>
        <input type="checkbox" id="pg-uppercase" checked>
      </div>
      <div class="pg-option">
        <label for="pg-lowercase">Minuscole (a-z)</label>
        <input type="checkbox" id="pg-lowercase" checked>
      </div>
      <div class="pg-option">
        <label for="pg-digits">Numeri (0-9)</label>
        <input type="checkbox" id="pg-digits" checked>
      </div>
      <div class="pg-option">
        <label for="pg-special">Simboli (!@#)</label>
        <input type="checkbox" id="pg-special" checked>
      </div>
    </div>

    <div class="pg-result">
      <div id="pg-display">...</div>
      <button id="pg-copy-btn" title="Copia negli appunti">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
        </svg>
      </button>
    </div>

    <button id="pg-generate-btn">Genera Password ⚡</button>
  </div>

  <div id="pg-toast" class="pg-toast"><span>✅</span> Password copiata!</div>

</div>

<style>
.pg-wrap {
  font-family: 'Outfit', sans-serif;
  display: flex;
  justify-content: center;
  padding: 2rem 1rem;
}

.pg-container {
  background: rgba(255, 255, 255, 0.75);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  padding: 2.5rem;
  border-radius: 24px;
  box-shadow: 0 8px 32px rgba(31, 38, 135, 0.15);
  border: 1px solid rgba(255, 255, 255, 0.4);
  width: 100%;
  max-width: 440px;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.pg-container:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 40px rgba(31, 38, 135, 0.22);
}

.pg-title {
  text-align: center;
  margin: 0 0 2rem;
  font-weight: 700;
  font-size: 1.9rem;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.pg-options {
  margin-bottom: 1.5rem;
}

.pg-option {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.5rem 0;
  border-bottom: 1px solid rgba(0,0,0,0.05);
}

.pg-option:last-child {
  border-bottom: none;
}

.pg-option label {
  color: #1e293b;
  font-weight: 500;
  font-size: 1rem;
}

.pg-option input[type="checkbox"] {
  appearance: none;
  -webkit-appearance: none;
  width: 24px;
  height: 24px;
  flex-shrink: 0;
  background: rgba(255,255,255,0.5);
  border-radius: 6px;
  border: 2px solid #cbd5e1;
  cursor: pointer;
  position: relative;
  transition: all 0.2s ease;
}

.pg-option input[type="checkbox"]:checked {
  background: #6366f1;
  border-color: #6366f1;
}

.pg-option input[type="checkbox"]:checked::after {
  content: '✓';
  position: absolute;
  color: white;
  font-size: 15px;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

.pg-option input[type="number"] {
  width: 70px;
  flex-shrink: 0;
  padding: 0.5rem;
  border: 2px solid #e2e8f0;
  border-radius: 10px;
  font-size: 1rem;
  text-align: center;
  background: rgba(255,255,255,0.8);
  font-family: inherit;
  transition: border-color 0.2s;
}

.pg-option input[type="number"]:focus {
  outline: none;
  border-color: #6366f1;
}

.pg-result {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 1.5rem;
  border: 2px solid #e2e8f0;
  border-radius: 16px;
  background: rgba(255,255,255,0.9);
  padding: 0.5rem 0.5rem 0.5rem 1rem;
  min-height: 58px;
}

#pg-display {
  flex: 1;
  font-family: monospace;
  font-size: 1.1rem;
  color: #1e293b;
  word-break: break-all;
  overflow-x: auto;
  transition: opacity 0.1s ease;
}

#pg-copy-btn {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  border: none;
  border-radius: 8px;
  padding: 8px;
  color: #64748b;
  cursor: pointer;
  transition: all 0.2s ease;
}

#pg-copy-btn:hover {
  background: rgba(99, 102, 241, 0.1);
  color: #6366f1;
}

#pg-generate-btn {
  width: 100%;
  padding: 1rem;
  background: linear-gradient(135deg, #6366f1, #4f46e5);
  color: white;
  font-size: 1.1rem;
  font-weight: 600;
  font-family: inherit;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

#pg-generate-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
}

#pg-generate-btn:active {
  transform: translateY(0);
}

.pg-toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: white;
  color: #10b981;
  padding: 12px 24px;
  border-radius: 50px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  font-weight: 600;
  font-family: inherit;
  display: flex;
  align-items: center;
  gap: 8px;
  opacity: 0;
  transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  z-index: 9999;
  pointer-events: none;
}

.pg-toast.pg-show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}

@media (max-width: 480px) {
  .pg-container { padding: 1.5rem; }
  .pg-title { font-size: 1.5rem; }
  #pg-display { font-size: 0.95rem; }
}
</style>

<script>
(function () {
  var lengthEl    = document.getElementById('pg-length');
  var uppercaseEl = document.getElementById('pg-uppercase');
  var lowercaseEl = document.getElementById('pg-lowercase');
  var digitsEl    = document.getElementById('pg-digits');
  var specialEl   = document.getElementById('pg-special');
  var generateBtn = document.getElementById('pg-generate-btn');
  var display     = document.getElementById('pg-display');
  var copyBtn     = document.getElementById('pg-copy-btn');
  var toast       = document.getElementById('pg-toast');

  var charSets = {
    uppercase: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
    lowercase: 'abcdefghijklmnopqrstuvwxyz',
    digits:    '0123456789',
    special:   '!@#$%^&*()_+-=[]{}|;:,.<>?'
  };

  function showToast() {
    toast.classList.add('pg-show');
    setTimeout(function () { toast.classList.remove('pg-show'); }, 3000);
  }

  function rand(max) {
    var a = new Uint32Array(1);
    window.crypto.getRandomValues(a);
    return a[0] % max;
  }

  function generatePassword() {
    var length = Math.min(64, Math.max(6, parseInt(lengthEl.value, 10)));
    lengthEl.value = length;

    var chars = '';
    var pool  = [];

    if (uppercaseEl.checked) { chars += charSets.uppercase; pool.push(charSets.uppercase[rand(charSets.uppercase.length)]); }
    if (lowercaseEl.checked) { chars += charSets.lowercase; pool.push(charSets.lowercase[rand(charSets.lowercase.length)]); }
    if (digitsEl.checked)    { chars += charSets.digits;    pool.push(charSets.digits[rand(charSets.digits.length)]); }
    if (specialEl.checked)   { chars += charSets.special;   pool.push(charSets.special[rand(charSets.special.length)]); }

    if (!chars) {
      chars = charSets.lowercase;
      pool.push(charSets.lowercase[rand(charSets.lowercase.length)]);
      lowercaseEl.checked = true;
    }

    while (pool.length < length) { pool.push(chars[rand(chars.length)]); }

    for (var i = pool.length - 1; i > 0; i--) {
      var j = rand(i + 1);
      var tmp = pool[i]; pool[i] = pool[j]; pool[j] = tmp;
    }

    display.textContent = pool.join('');
    display.style.opacity = '0.4';
    setTimeout(function () { display.style.opacity = '1'; }, 60);
  }

  generateBtn.addEventListener('click', generatePassword);
  lengthEl.addEventListener('keyup', function (e) { if (e.key === 'Enter') generatePassword(); });
  copyBtn.addEventListener('click', function () {
    var pw = display.textContent;
    if (pw && pw !== '...') {
      navigator.clipboard.writeText(pw).then(showToast).catch(console.error);
    }
  });

  generatePassword();
})();
</script>
